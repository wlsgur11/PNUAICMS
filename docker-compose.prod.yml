# ─────────────────────────────────────────────────────────
# 자체 서버 운영용 (B안: GHCR 이미지 pull 방식).
#  - 서버는 빌드하지 않고, CI가 구워 GHCR에 올린 이미지를 태그(SHA)로 받아 교체한다.
#  - DB: 교내 자체 PostgreSQL(아래 db 서비스). 앱은 docker 네트워크로 db:5432 접속.
#    .env 의 DATABASE_URL/DIRECT_URL = postgresql://cms:${POSTGRES_PASSWORD}@db:5432/cms?schema=public
#  - 배포: ./deploy.sh   (현재/대상 SHA 비교 → 확인 → 해당 태그 pull + 교체)
#  - 외부 노출(80/443)은 Caddy가 담당(HTTPS). 앱은 내부 3000.
#  - 백업: ~/cms/backup-db.sh (매일 cron). DB 데이터는 cms_pgdata 볼륨에 영구 저장.
# ─────────────────────────────────────────────────────────
services:
  app:
    image: ghcr.io/wlsgur11/pnuaicms:${TAG:-latest}
    container_name: cms_app
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: cms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cms
    volumes:
      - cms_pgdata:/var/lib/postgresql/data
    # 호스트 포트 노출 안 함(보안). 디버깅 필요시만 ['127.0.0.1:5432:5432'] 추가.

volumes:
  cms_pgdata:
