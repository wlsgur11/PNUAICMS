name: release-image
on:
  push:
    branches: [main]
  workflow_dispatch:        # Actions 탭에서 수동 실행도 가능
jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/wlsgur11/pnuaicms:${{ steps.vars.outputs.sha }}
            ghcr.io/wlsgur11/pnuaicms:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
