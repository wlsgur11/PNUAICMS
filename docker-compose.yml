# ─────────────────────────────────────────────────────────
# 자체 서버 단일 호스팅용 (가장 단순한 배포). 실행: docker compose up -d --build
#
# 비밀값은 같은 폴더의 .env 파일에서 읽는다 (.env.example 참고, .env 는 커밋 금지).
#   POSTGRES_PASSWORD=...   AUTH_SECRET=...   AUTH_GOOGLE_ID=...   AUTH_GOOGLE_SECRET=...
#
# 첫 실행 시 스키마 적용(1회): docs/deployment.md 의 "스키마 적용" 참고.
# Supabase → 자체DB 이전: pg_dump 로 받아 db 컨테이너에 복원하면 끝.
# ─────────────────────────────────────────────────────────
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cms} -d ${POSTGRES_DB:-cms}']
      interval: 10s
      timeout: 5s
      retries: 5
    # 외부 노출이 꼭 필요할 때만 주석 해제 (기본은 app 컨테이너에서만 접근)
    # ports:
    #   - '5432:5432'

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cms}'
      DIRECT_URL: 'postgresql://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cms}'
      # 인증: 운영에서는 실제 Google OAuth 값을 .env 에 채우고 AUTH_BYPASS 는 false 로 둔다.
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_BYPASS: ${AUTH_BYPASS:-false}
      # 자동조회(선택)
      DART_API_KEY: ${DART_API_KEY:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
    ports:
      - '3000:3000'

volumes:
  pgdata:
